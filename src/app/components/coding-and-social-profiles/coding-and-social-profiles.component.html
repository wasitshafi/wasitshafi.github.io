<section
	id="{{ constants.homeSectionLinksId.CODING_AND_SOCIAL_PROFILES }}"
	class="{{ constants.STYLE_PREFIX }}coding-and-social-profiles-section"
>
	<div
		class="{{
			constants.STYLE_PREFIX
		}}coding-and-social-profiles-section-content"
	>
		<h2 class="{{ constants.STYLE_PREFIX }}section-title">
			Coding & Social Profiles
		</h2>

		<div class="d-flex d-justify-content-between flex-wrap">
			<div
				class="w-50"
				*ngFor="let codingAndSocialProfilesData of codingAndSocialProfiles"
			>
				<a [href]="codingAndSocialProfilesData.profileURL">{{
					codingAndSocialProfilesData.platformName
				}}</a>
			</div>
		</div>
	</div>
</section>
