<section
	id="{{ constants.homeSectionLinksId.EDUCATION }}"
	class="{{ constants.STYLE_PREFIX }}education-section"
>
	<div class="{{ constants.STYLE_PREFIX }}education-section-content">
		<h2 class="text-center">Education</h2>
		<div *ngFor="let educationData of education">
			<h2>{{ educationData.university }}</h2>
			<div>
				{{ educationData.degree }} - {{ educationData.score }} -
				{{ educationData.endDate }}
			</div>
		</div>
	</div>
</section>
