<div class="fluid {{ constants.STYLE_PREFIX }}home-wrapper">
	<div class="container-xl {{ constants.STYLE_PREFIX }}home-wrapper-content">
		<!-- About Section -->

		<app-about></app-about>
		<!-- Work Experience Section -->

		<app-work-experience></app-work-experience>
		<!-- Skills Section -->

		<app-skills></app-skills>
		<!-- Personal Projects Section -->

		<!-- TODO: enable personal projects in prod when there is new content for the section -->
		<app-personal-projects
			*ngIf="appDataService.isDevEnv"
		></app-personal-projects>
		<!-- Education Section -->

		<app-education></app-education>
		<!-- Achievements & Responsibilities Section -->

		<app-achievements-and-responsibilities></app-achievements-and-responsibilities>
		<!-- Coding & Social Profile Section -->

		<app-coding-and-social-profiles></app-coding-and-social-profiles>
		<!-- Awards & Certifications Section -->

		<app-awards-and-certifications></app-awards-and-certifications>
		<!-- Contact Me Section -->

		<app-contact></app-contact>
	</div>
</div>

<button
	class="{{ constants.STYLE_PREFIX }}back-to-top-wrapper"
	(click)="handleScrollToTop()"
	id="{{ constants.STYLE_PREFIX }}scroll-to-top-button"
>
	<img
		src="../../../assets/images/up-arrow-inside-circle-icon.svg"
		alt="up-arrow"
	/>
</button>
